name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Recrear entorno nativo limpio
        run: flutter create . --platforms=android

      # 👈 CORREGIDO: Inyección nativa compatible con la estructura real de Flutter 3.27
      - name: Configurar Gradle para Firebase y minSdk 23
        run: |
          # 1. Forzar el minSdk a 23 en el build.gradle de la app
          sed -i 's/\(minSdk[[:space:]]*=[[:space:]]*\).*/\123/' android/app/build.gradle
          sed -i 's/\(minSdkVersion[[:space:]]*=[[:space:]]*\).*/\123/' android/app/build.gradle
          
          # 2. Agregar el classpath de Google Services en el buildscript del proyecto
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
          
          # 3. Aplicar el plugin de Google Services abajo de la configuración de la app
          echo 'apply plugin: "com.google.gms.google-services"' >> android/app/build.gradle

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hivefi-release
          path: build/app/outputs/flutter-apk/app-release.apk
