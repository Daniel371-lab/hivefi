name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Recrear entorno nativo limpio
        run: flutter create --org com.jplabs --project-name hivefi . --platforms=android

      - name: Configurar Gradle para Firebase, AdMob y minSdk 23
        run: |
          cat << 'EOF' > patch.py
          import os
          import re

          # 1. settings.gradle — Google Services plugin + AGP 8.1.1
          settings_path = 'android/settings.gradle'
          if os.path.exists(settings_path):
              with open(settings_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services" version "4.4.2" apply false')
              content = re.sub(
                  r'id\s+"com\.android\.application"\s+version\s+"[^"]*"',
                  'id "com.android.application" version "8.1.1"',
                  content
              )
              content = re.sub(
                  r'id\s+"com\.android\.library"\s+version\s+"[^"]*"',
                  'id "com.android.library" version "8.1.1"',
                  content
              )
              with open(settings_path, 'w') as f:
                  f.write(content)

          # 2. app/build.gradle — Google Services + minSdk 23
          app_path = 'android/app/build.gradle'
          if os.path.exists(app_path):
              with open(app_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services"')
              content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              content = content.replace('minSdkVersion = flutter.minSdkVersion', 'minSdk = 23')
              with open(app_path, 'w') as f:
                  f.write(content)

          # 3. gradle-wrapper.properties — Gradle 8.3 compatible con AGP 8.1.1
          wrapper_path = 'android/gradle/wrapper/gradle-wrapper.properties'
          if os.path.exists(wrapper_path):
              with open(wrapper_path, 'r') as f:
                  content = f.read()
              content = re.sub(
                  r'distributionUrl=.*',
                  'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-bin.zip',
                  content
              )
              with open(wrapper_path, 'w') as f:
                  f.write(content)

          # 4. AndroidManifest.xml — App ID de AdMob
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f:
                  content = f.read()
              admob_meta = '        <meta-data\n            android:name="com.google.android.gms.ads.APPLICATION_ID"\n            android:value="ca-app-pub-2628699742979891~7557734775"/>'
              if 'APPLICATION_ID' not in content:
                  content = content.replace('<application', admob_meta + '\n\n    <application', 1)
              with open(manifest_path, 'w') as f:
                  f.write(content)
          EOF
          python3 patch.py
          rm patch.py

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - name: Generar icono de launcher
        run: dart run flutter_launcher_icons

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hivefi-release
          path: build/app/outputs/flutter-apk/app-release.apk