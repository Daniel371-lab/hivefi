name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Recrear entorno nativo limpio
        run: flutter create . --platforms=android

      # 👈 SOLUCIÓN INFA LIBLE: Inyecta el minSdk directamente donde Flutter lo lee obligatoriamente
      - name: Configurar SDK mínimo para Firebase
        run: |
          echo "flutter.minSdkVersion=23" >> android/local.properties

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hivefi-release
          path: build/app/outputs/flutter-apk/app-release.apk
