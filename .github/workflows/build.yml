name: Build APK y AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Recrear entorno nativo limpio
        run: flutter create --org com.jplabs --project-name hivefi . --platforms=android

      - name: Configurar Gradle para Firebase, minSdk 23 y Billing
        run: |
          cat << 'EOF' > patch.py
          import os
          import re

          # 1. Configurar Gradle
          settings_path = 'android/settings.gradle'
          if os.path.exists(settings_path):
              with open(settings_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services" version "4.4.2" apply false')
                  with open(settings_path, 'w') as f:
                      f.write(content)

          app_path = 'android/app/build.gradle'
          if os.path.exists(app_path):
              with open(app_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services"')
              content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              content = content.replace('minSdkVersion = flutter.minSdkVersion', 'minSdk = 23')
              with open(app_path, 'w') as f:
                  f.write(content)

          # 2. Inyectar Manifest (AdMob y Billing)
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f:
                  content = f.read()
              
              admob_meta = '\n        <meta-data\n            android:name="com.google.android.gms.ads.APPLICATION_ID"\n            android:value="ca-app-pub-2628699742979891~7557734775"/>'
              billing_perm = '\n    <uses-permission android:name="com.android.vending.BILLING" />'
              
              if 'APPLICATION_ID' not in content:
                  content = re.sub(r'(<application[^>]*>)', r'\1' + admob_meta, content)
              if 'BILLING' not in content:
                  content = content.replace('<manifest', '<manifest' + billing_perm)
                  
              with open(manifest_path, 'w') as f:
                  f.write(content)
          EOF
          python3 patch.py
          rm patch.py

      - name: Decodificar Keystore y crear key.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          cat << EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - name: Generar icono de launcher
        run: dart run flutter_launcher_icons

      - name: Compilar APK y AppBundle
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: hivefi-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Subir AppBundle
        uses: actions/upload-artifact@v4
        with:
          name: hivefi-aab
          path: build/app/outputs/bundle/release/app-release.aab
