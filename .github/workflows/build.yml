Name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      # 👈 EL FIX MAESTRO: Se crea el entorno nativo ya con tu paquete correcto en MainActivity
      - name: Recrear entorno nativo limpio
        run: flutter create --org com.jplabs --project-name hivefi . --platforms=android

      # 📦 PASO NUEVO Y SEGURO: Copia tu logo y le cambia el nombre al que Android espera por defecto
      - name: Inyectar logo de Hivefi como icono de la app
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          cp assets/images/logo_hivefi.webp android/app/src/main/res/mipmap-hdpi/ic_launcher.webp
          cp assets/images/logo_hivefi.webp android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.webp

      - name: Configurar Gradle para Firebase y minSdk 23
        run: |
          cat << 'EOF' > patch.py
          import os

          # 1. Añadir plugin global de Google Services
          settings_path = 'android/settings.gradle'
          if os.path.exists(settings_path):
              with open(settings_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services" version "4.4.2" apply false')
                  with open(settings_path, 'w') as f:
                      f.write(content)

          # 2. Aplicar plugin en app y forzar minSdk 23
          app_path = 'android/app/build.gradle'
          if os.path.exists(app_path):
              with open(app_path, 'r') as f:
                  content = f.read()
              
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services"')
              
              content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              content = content.replace('minSdkVersion = flutter.minSdkVersion', 'minSdk = 23')
              
              with open(app_path, 'w') as f:
                  f.write(content)
          EOF
          python3 patch.py
          rm patch.py

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hivefi-release
          path: build/app/outputs/flutter-apk/app-release.apk
