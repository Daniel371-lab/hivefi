name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Recrear entorno nativo limpio
        run: flutter create . --platforms=android

      # 👈 CONFIGURACIÓN GARANTIZADA: Modifica los archivos reales de Flutter usando Python para evitar fallos de sintaxis
      - name: Configurar Gradle para Firebase y minSdk 23
        run: |
          cat << 'EOF' > patch.py
          import os
          import re

          # 1. Modificar settings.gradle de la raíz (Registrar el plugin global de Google Services)
          settings_path = 'android/settings.gradle'
          if os.path.exists(settings_path):
              with open(settings_path, 'r') as f:
                  content = f.read()
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services" version "4.4.2" apply false')
                  with open(settings_path, 'w') as f:
                      f.write(content)
                  print("✅ Google Services registrado en settings.gradle")

          # 2. Modificar build.gradle de la app (Aplicar plugin, minSdk 23 y asegurar package name)
          app_path = 'android/app/build.gradle'
          if os.path.exists(app_path):
              with open(app_path, 'r') as f:
                  content = f.read()
              
              # Aplicar el plugin en la app
              if 'plugins {' in content:
                  content = content.replace('plugins {', 'plugins {\n    id "com.google.gms.google-services"')
                  print("✅ Plugin aplicado en app/build.gradle")
              
              # Forzar minSdk a 23 de forma directa reemplazando la variable de Flutter
              content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              content = content.replace('minSdkVersion = flutter.minSdkVersion', 'minSdk = 23')
              content = content.replace('minSdkVersion flutter.minSdkVersion', 'minSdk = 23')
              print("✅ minSdkVersion forzado a 23")
              
              # Asegurar que el applicationId coincida con tu google-services.json de Firebase
              content = re.sub(r'applicationId\s*=\s*".*"', 'applicationId = "com.jplabs.hivefi"', content)
              content = re.sub(r'namespace\s*=\s*".*"', 'namespace = "com.jplabs.hivefi"', content)
              print("✅ Package name sincronizado a com.jplabs.hivefi")
              
              with open(app_path, 'w') as f:
                  f.write(content)
          EOF
          python3 patch.py
          rm patch.py

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hivefi-release
          path: build/app/outputs/flutter-apk/app-release.apk
