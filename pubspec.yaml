name: hivefi
description: Hivefi - Finanzas Personales
publish_to: 'none'

version: 1.0.0+11

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  google_mobile_ads: ^4.0.0
  in_app_purchase: ^3.2.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_hivefi.webp"
  min_sdk_android: 21
  adaptive_icon_background: "#F59E0B"
  adaptive_icon_foreground: "assets/images/logo_hivefi.webp"